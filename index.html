<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kochi Metro • Live Map</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header id="header">
        <div id="header-content">
            <img src="https://upload.wikimedia.org/wikipedia/en/1/18/Koch_Metro_Logo.png" alt="Kochi Metro Logo" id="metro-logo">
            <span id="header-title">Kochi Metro • Live Network Map</span>
        </div>
    </header>

    <main id="app-container">
        <!-- Control Hub -->
        <section id="control-hub">
            <div id="live-clock" class="digital-display">
                <span class="label">CURRENT TIME</span>
                <span id="clock-value">00:00:00</span>
            </div>
            
            <div id="filters">
                <button class="filter-btn active" data-filter="all">ALL</button>
                <button class="filter-btn" data-filter="up">UP</button>
                <button class="filter-btn" data-filter="down">DOWN</button>
            </div>
            
            <div id="status-panel" class="digital-display">
                <span class="label">LIVE STATUS</span>
                <span id="status-indicator" class="online">ONLINE</span>
            </div>
        </section>

        <!-- Speed / Mode Controller -->
        <section id="sim-controls">
            <div class="control-group">
                <span class="label">SIMULATION SPEED</span>
                <input type="range" id="speed-slider" min="1" max="100" value="1">
                <span id="speed-value">1x</span>
            </div>
            <div id="next-train-board">
                <span class="label">NEXT DEPARTURES</span>
                <div id="departure-slots">
                    <span class="no-data">Calculating...</span>
                </div>
            </div>
        </section>

        <!-- Interactive Map Board -->
        <div id="board-overflow-container">
            <div id="board">
                <div id="track-down" class="track track-down"></div>
                <div id="track-up" class="track track-up"></div>
                
                <div id="station-list"></div>
                <!-- Trains will be injected here via JS -->
            </div>
        </div>

        <div id="disclaimer">
            <i class="icon">ℹ️</i> Train movement simulated from official timetable data. Real-time deviations may occur.
        </div>
    </main>

    <footer id="credits-container">
        <div id="credits">
            Built by <a href="https://github.com/welkincedev/kochi-metro-live-map" target="_blank">Welkince Clair</a> 
            • Data: <a href="https://kochimetro.org" target="_blank">Kochi Metro</a> 
            • Inspired by <a href="https://instagram.com/designrulesco" target="_blank">Designrulesco</a>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
